<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALFA Studio - Store v1.1</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #030305;
            --glass-bg: rgba(13, 27, 42, 0.4);
            --glass-border: rgba(65, 105, 225, 0.2);
            --glass-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            --primary-color: #00d2ff;
            --secondary-color: #3a7bd5;
            --text-main: #ffffff;
            --text-muted: #a0aab5;
            --btn-hover: rgba(0, 210, 255, 0.2);
            --transition-speed: 0.4s;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Roboto', sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-main); min-height: 100vh; overflow-x: hidden; position: relative; }

        /* Background Effects */
        .bg-blobs { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; overflow: hidden; background: linear-gradient(to bottom right, #000000, #001220); }
        .blob { position: absolute; filter: blur(80px); opacity: 0.5; animation: float 15s infinite ease-in-out alternate; }
        .blob-1 { width: 400px; height: 400px; background: var(--secondary-color); top: -10%; left: -10%; }
        .blob-2 { width: 500px; height: 500px; background: #000814; bottom: -20%; right: -10%; animation-delay: -5s; }
        .blob-3 { width: 300px; height: 300px; background: #005f73; top: 40%; left: 50%; animation-delay: -10s; }

        @keyframes float { 0% { transform: translate(0, 0) scale(1); } 100% { transform: translate(30px, 50px) scale(1.1); } }

        /* Header */
        header { display: flex; justify-content: space-between; align-items: center; padding: 15px 5%; background: rgba(3, 3, 5, 0.7); backdrop-filter: blur(15px); border-bottom: 1px solid var(--glass-border); position: sticky; top: 0; z-index: 100; flex-wrap: wrap; gap: 15px; }
        .logo { font-size: 24px; font-weight: 700; background: linear-gradient(45deg, var(--primary-color), var(--secondary-color)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        .search-bar { flex-grow: 1; max-width: 400px; position: relative; }
        .search-bar input { width: 100%; padding: 10px 15px; border-radius: 20px; background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); color: white; outline: none; transition: var(--transition-speed); }
        .search-bar input:focus { border-color: var(--primary-color); background: rgba(255,255,255,0.1); }

        .lang-switch select { background: var(--glass-bg); color: var(--text-main); border: 1px solid var(--glass-border); padding: 8px 12px; border-radius: 8px; outline: none; cursor: pointer; transition: var(--transition-speed); }
        .lang-switch select:hover { border-color: var(--primary-color); }
        .lang-switch select option { background: var(--bg-color); color: var(--text-main); }

        /* Main Content Transition Wrapper */
        #content-wrapper { transition: opacity var(--transition-speed) ease; }
        .fade-out { opacity: 0 !important; }

        /* Hero */
        .hero { text-align: center; padding: 40px 20px; }
        .hero h1 { font-size: 2.5rem; margin-bottom: 15px; }
        .hero p { color: var(--text-muted); margin-bottom: 20px; }

        /* Grid */
        .container { max-width: 1200px; margin: 0 auto; padding: 0 20px 40px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 25px; }

        /* Cards */
        .card { background: var(--glass-bg); backdrop-filter: blur(12px); border: 1px solid var(--glass-border); border-radius: 16px; padding: 25px; cursor: pointer; transition: transform var(--transition-speed), box-shadow var(--transition-speed); position: relative; overflow: hidden; display: flex; align-items: center; gap: 15px; }
        .card:hover { transform: translateY(-5px); box-shadow: 0 10px 30px rgba(0, 210, 255, 0.15); border-color: rgba(0, 210, 255, 0.4); }
        .card-icon { width: 60px; height: 60px; background: linear-gradient(135deg, var(--glass-border), var(--secondary-color)); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 24px; font-weight: bold; flex-shrink: 0; }
        .card-info { flex-grow: 1; }
        .card-title { font-size: 1.2rem; margin-bottom: 5px; }
        .card-dev { font-size: 0.8rem; color: var(--text-muted); margin-bottom: 5px; }
        .badge-wip { font-size: 0.7rem; color: #ff9800; background: rgba(255, 152, 0, 0.1); border: 1px solid rgba(255, 152, 0, 0.3); padding: 2px 6px; border-radius: 8px; display: inline-block; }

        /* Loading Screen */
        #loader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(3,3,5,0.9); backdrop-filter: blur(10px); z-index: 999; display: flex; justify-content: center; align-items: center; opacity: 0; pointer-events: none; transition: opacity 0.3s; }
        #loader.active { opacity: 1; pointer-events: all; }
        .spinner { width: 50px; height: 50px; border: 4px solid rgba(255,255,255,0.1); border-top-color: var(--primary-color); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* App Details View (Fullscreen Modal) */
        #app-view { position: fixed; top: 0; left: 100%; width: 100%; height: 100%; background: var(--bg-color); z-index: 1000; overflow-y: auto; transition: left 0.5s cubic-bezier(0.25, 1, 0.5, 1); }
        #app-view.open { left: 0; }
        
        .app-view-header { padding: 20px 5%; position: sticky; top: 0; background: rgba(3,3,5,0.8); backdrop-filter: blur(10px); z-index: 10; border-bottom: 1px solid var(--glass-border); }
        .back-btn { background: transparent; border: none; color: white; font-size: 1.5rem; cursor: pointer; display: flex; align-items: center; gap: 10px; transition: color 0.3s; }
        .back-btn:hover { color: var(--primary-color); }

        .app-content { max-width: 900px; margin: 0 auto; padding: 40px 20px; }
        .app-hero { display: flex; gap: 25px; align-items: center; margin-bottom: 30px; }
        .app-hero .card-icon { width: 100px; height: 100px; font-size: 40px; border-radius: 20px; }
        .app-hero h1 { font-size: 2.5rem; margin-bottom: 5px; }
        .app-hero .dev { color: var(--primary-color); font-size: 1.1rem; }

        /* Buttons */
        .btn-group { display: flex; gap: 15px; margin-bottom: 40px; flex-wrap: wrap; }
        .btn { padding: 12px 25px; border-radius: 10px; text-decoration: none; font-size: 1rem; font-weight: 500; cursor: pointer; border: 1px solid transparent; text-align: center; min-width: 150px; transition: all 0.3s; }
        .btn-primary { background: var(--secondary-color); color: #fff; }
        .btn-primary:hover { background: var(--primary-color); box-shadow: 0 0 15px rgba(0, 210, 255, 0.4); }
        .btn-outline { background: transparent; border-color: var(--secondary-color); color: var(--text-main); }
        .btn-outline:hover { background: var(--btn-hover); border-color: var(--primary-color); }
        .btn-disabled { background: rgba(255,255,255,0.05); color: #666; cursor: not-allowed; border-color: rgba(255,255,255,0.1); }

        /* Accordions */
        .accordion { background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: 12px; margin-bottom: 15px; overflow: hidden; }
        .acc-header { padding: 15px 20px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; font-weight: 500; transition: background 0.3s; }
        .acc-header:hover { background: rgba(255,255,255,0.05); }
        .acc-icon { transition: transform 0.3s; }
        .accordion.active .acc-icon { transform: rotate(180deg); }
        .acc-body { max-height: 0; overflow: hidden; transition: max-height 0.4s ease; padding: 0 20px; color: var(--text-muted); line-height: 1.6; }
        .accordion.active .acc-body { max-height: 500px; padding: 0 20px 20px 20px; } /* max-height is arbitrary large enough */

        /* Recommendations */
        .recommendations { margin-top: 60px; padding-top: 30px; border-top: 1px solid var(--glass-border); }
        .recommendations h3 { margin-bottom: 20px; font-size: 1.5rem; }

        /* Footer */
        footer { text-align: center; padding: 20px; color: #555; font-size: 0.8rem; border-top: 1px solid var(--glass-border); margin-top: 40px; }
    </style>
</head>
<body>

    <div class="bg-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <header>
        <div class="logo">ALFA Studio</div>
        <div class="search-bar">
            <input type="text" id="searchInput" placeholder="Пошук додатків..." oninput="handleSearch()">
        </div>
        <div class="lang-switch">
            <select id="langSelect" onchange="changeLanguage(this.value)">
                <option value="uk" selected>Українська</option>
                <option value="ru">Русский</option>
                <option value="en">English</option>
            </select>
        </div>
    </header>

    <div id="content-wrapper">
        <section class="hero">
            <h1 id="hero-title">Магазин проєктів</h1>
            <p id="hero-desc">Офіційний портал додатків, систем та утиліт від ALFA Studio.</p>
        </section>

        <div class="container">
            <div class="grid" id="projects-container">
                </div>
        </div>
    </div>

    <div id="loader"><div class="spinner"></div></div>

    <div id="app-view">
        <div class="app-view-header">
            <button class="back-btn" onclick="closeApp()"><svg width="24" height="24" fill="currentColor" viewBox="0 0 24 24"><path d="M15.41 16.59L10.83 12l4.58-4.59L14 6l-6 6 6 6 1.41-1.41z"/></svg> <span id="back-text">Назад</span></button>
        </div>
        <div class="app-content">
            <div class="app-hero">
                <div class="card-icon" id="det-icon">A</div>
                <div>
                    <h1 id="det-title">App Title</h1>
                    <div class="dev" id="det-dev">ALFA Studio</div>
                </div>
            </div>
            
            <div class="btn-group" id="det-buttons">
                </div>

            <div class="accordion active" onclick="toggleAcc(this)">
                <div class="acc-header"><span id="lbl-desc">Опис додатка</span> <span class="acc-icon">▼</span></div>
                <div class="acc-body" id="det-desc">Опис...</div>
            </div>

            <div class="accordion" onclick="toggleAcc(this)">
                <div class="acc-header"><span id="lbl-info">Додаткова інформація</span> <span class="acc-icon">▼</span></div>
                <div class="acc-body">
                    <p><strong id="lbl-version">Версія:</strong> <span id="det-version">1.0</span></p>
                    <p><strong>OS:</strong> Windows / Web Browser</p>
                    <p><strong>Розробник:</strong> ALFA Studio</p>
                </div>
            </div>

            <div class="recommendations">
                <h3 id="lbl-rec">Рекомендовані для вас</h3>
                <div class="grid" id="rec-container">
                    </div>
            </div>
        </div>
        <footer>ALFA Store v 1.1 | © 2026 ALFA Studio</footer>
    </div>

    <script>
        const translations = {
            uk: {
                search: "Пошук додатків...", heroTitle: "Магазин проєктів", heroDesc: "Офіційний портал додатків, систем та утиліт.",
                btnBrowser: "Браузер", btnWin: "Windows", btnWip: "Скоро", badgeWip: "В розробці", dev: "Розробник: ALFA Studio",
                back: "Назад", lblDesc: "Опис додатка", lblInfo: "Додаткова інформація", lblVer: "Версія:", lblRec: "Рекомендовані для вас"
            },
            ru: {
                search: "Поиск приложений...", heroTitle: "Магазин проектов", heroDesc: "Официальный портал приложений, систем и утилит.",
                btnBrowser: "Браузер", btnWin: "Windows", btnWip: "Скоро", badgeWip: "В разработке", dev: "Разработчик: ALFA Studio",
                back: "Назад", lblDesc: "Описание приложения", lblInfo: "Дополнительная информация", lblVer: "Версия:", lblRec: "Рекомендовано вам"
            },
            en: {
                search: "Search apps...", heroTitle: "Projects Store", heroDesc: "Official portal of apps, systems, and utilities.",
                btnBrowser: "Browser", btnWin: "Windows", btnWip: "Coming Soon", badgeWip: "In Development", dev: "Developer: ALFA Studio",
                back: "Back", lblDesc: "App Description", lblInfo: "Additional Information", lblVer: "Version:", lblRec: "Recommended for you"
            }
        };

        const projects = [
            { id: 1, title: "Hi Messenger OLD", version: "1.41", isWip: false, desc: { uk: "Стара версія месенджера з підтримкою. Працює у браузері.", ru: "Старая версия мессенджера. Работает в браузере.", en: "Old messenger version. Runs in browser." }, buttons: [ { type: "browser", link: "#" } ] },
            { id: 2, title: "Hi Messenger", version: "2.0", isWip: false, desc: { uk: "Оновлений сучасний месенджер.", ru: "Обновленный современный мессенджер.", en: "Updated modern messenger." }, buttons: [ { type: "browser", link: "#" }, { type: "windows", link: "#" } ] },
            { id: 3, title: "ATube", version: "TBA", isWip: true, desc: { uk: "Аналог YouTube. Оптимізовано для ПК.", ru: "Аналог YouTube. Оптимизировано для ПК.", en: "YouTube analog. Optimized for PC." }, buttons: [ { type: "wip", link: "#" } ] },
            { id: 4, title: "GyperOS", version: "1.0", isWip: false, desc: { uk: "Операційна система, створена на HTML.", ru: "Операционная система на HTML.", en: "HTML based OS." }, buttons: [ { type: "browser", link: "#" } ] },
            { id: 5, title: "ALFA UI", version: "2.0", isWip: true, desc: { uk: "Мобільна система на базі HTML.", ru: "Мобильная система на базе HTML.", en: "Mobile system based on HTML." }, buttons: [ { type: "wip", link: "#" } ] },
            { id: 6, title: "GComp HTML", version: "1.0", isWip: false, desc: { uk: "Компілятор HTML прямо у вашому браузері.", ru: "Компилятор HTML в браузере.", en: "HTML compiler in browser." }, buttons: [ { type: "browser", link: "#" } ] },
            { id: 7, title: "GComp Python", version: "1.0", isWip: true, desc: { uk: "Компілятор Python для браузера.", ru: "Компилятор Python для браузера.", en: "Python compiler for browser." }, buttons: [ { type: "wip", link: "#" } ] },
            { id: 8, title: "Gyper Ex", version: "Beta 1", isWip: true, desc: { uk: "Заміна стандартному провіднику Windows (C#).", ru: "Замена проводнику Windows (C#).", en: "Windows explorer replacement." }, buttons: [ { type: "wip", link: "#" } ] },
            { id: 9, title: "GUnlock", version: "Beta 1", isWip: false, desc: { uk: "Покращений диспетчер завдань для Windows.", ru: "Улучшенный диспетчер задач для Windows.", en: "Advanced task manager for Windows." }, buttons: [ { type: "windows", link: "#" } ] },
            { id: 10, title: "MeSearch", version: "TBA", isWip: true, desc: { uk: "Простий і легкий браузер для Windows.", ru: "Простой браузер для Windows.", en: "Simple browser for Windows." }, buttons: [ { type: "wip", link: "#" } ] },
            { id: 11, title: "MegaCalculator", version: "Beta 1", isWip: true, desc: { uk: "Прокачаний калькулятор з розширеним функціоналом.", ru: "Прокачанный калькулятор.", en: "Advanced calculator." }, buttons: [ { type: "wip", link: "#" } ] },
            { id: 12, title: "ALFA Benchmark", version: "1.0", isWip: true, desc: { uk: "Утиліта для перевірки характеристик пристрою.", ru: "Утилита для проверки характеристик.", en: "Device specification utility." }, buttons: [ { type: "wip", link: "#" } ] },
            // НОВІ ДОДАТКИ
            { id: 13, title: "GPaint", version: "1.0", isWip: true, desc: { uk: "Простий Paint для малювання. Для Windows у браузері.", ru: "Простой Paint для рисования. Для Windows в браузере.", en: "Simple Paint for drawing. For Windows in browser." }, buttons: [ { type: "wip", link: "#" } ] },
            { id: 14, title: "APhoto", version: "1.0", isWip: true, desc: { uk: "Покращений редактор для фото з простим і зрозумілим інтерфейсом. Для Windows у браузері.", ru: "Улучшенный фоторедактор с простым интерфейсом. Для Windows в браузере.", en: "Improved photo editor with simple interface. For Windows in browser." }, buttons: [ { type: "wip", link: "#" } ] },
            { id: 15, title: "GWord", version: "TBA", isWip: true, desc: { uk: "Покращений і безкоштовний аналог Microsoft Word. Для Windows.", ru: "Улучшенный и бесплатный аналог Microsoft Word. Для Windows.", en: "Improved and free Microsoft Word analog. For Windows." }, buttons: [ { type: "wip", link: "#" } ] }
        ];

        let currentLang = 'uk';
        let currentSearch = '';

        function renderProjects(containerId = 'projects-container', limit = null, excludeId = null) {
            const container = document.getElementById(containerId);
            container.innerHTML = '';
            const t = translations[currentLang];

            let filtered = projects.filter(p => p.title.toLowerCase().includes(currentSearch.toLowerCase()));
            if (excludeId) filtered = filtered.filter(p => p.id !== excludeId);
            if (limit) {
                // Випадкові додатки для рекомендацій
                filtered = filtered.sort(() => 0.5 - Math.random()).slice(0, limit);
            }

            filtered.forEach(proj => {
                const card = document.createElement('div');
                card.className = 'card';
                card.onclick = () => openApp(proj.id);
                
                let wipBadge = proj.isWip ? `<span class="badge-wip">${t.badgeWip}</span>` : '';
                let iconChar = proj.title.charAt(0);

                card.innerHTML = `
                    <div class="card-icon">${iconChar}</div>
                    <div class="card-info">
                        <h3 class="card-title">${proj.title}</h3>
                        <div class="card-dev">ALFA Studio</div>
                        ${wipBadge}
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function handleSearch() {
            currentSearch = document.getElementById('searchInput').value;
            renderProjects();
        }

        function changeLanguage(lang) {
            const wrapper = document.getElementById('content-wrapper');
            wrapper.classList.add('fade-out'); // Плавне згасання
            
            setTimeout(() => {
                currentLang = lang;
                const t = translations[lang];
                
                // Оновлення текстів
                document.getElementById('searchInput').placeholder = t.search;
                document.getElementById('hero-title').innerText = t.heroTitle;
                document.getElementById('hero-desc').innerText = t.heroDesc;
                document.getElementById('back-text').innerText = t.back;
                document.getElementById('lbl-desc').innerText = t.lblDesc;
                document.getElementById('lbl-info').innerText = t.lblInfo;
                document.getElementById('lbl-version').innerText = t.lblVer;
                document.getElementById('lbl-rec').innerText = t.lblRec;
                document.getElementById('det-dev').innerText = "ALFA Studio";
                
                renderProjects();
                
                // Якщо відкрито вікно додатка, оновити і його контент
                if(document.getElementById('app-view').classList.contains('open')) {
                    // Знайдемо активний проєкт по назві (простий хак)
                    let activeTitle = document.getElementById('det-title').innerText;
                    let p = projects.find(x => x.title === activeTitle);
                    if(p) populateAppDetails(p);
                }

                wrapper.classList.remove('fade-out'); // Плавна поява
            }, 400); // Час збігається з --transition-speed
        }

        function openApp(id) {
            const loader = document.getElementById('loader');
            loader.classList.add('active'); // Показуємо спінер

            setTimeout(() => {
                const proj = projects.find(p => p.id === id);
                populateAppDetails(proj);
                
                document.getElementById('app-view').classList.add('open');
                loader.classList.remove('active'); // Ховаємо спінер
                
                // Генеруємо 6 рекомендацій
                renderProjects('rec-container', 6, id);
            }, 1000); // 1 секунда завантаження
        }

        function populateAppDetails(proj) {
            const t = translations[currentLang];
            document.getElementById('det-icon').innerText = proj.title.charAt(0);
            document.getElementById('det-title').innerText = proj.title;
            document.getElementById('det-desc').innerText = proj.desc[currentLang];
            document.getElementById('det-version').innerText = proj.version;

            let buttonsHtml = proj.buttons.map(btn => {
                if(btn.type === 'browser') return `<a href="${btn.link}" class="btn btn-outline">${t.btnBrowser}</a>`;
                if(btn.type === 'windows') return `<a href="${btn.link}" class="btn btn-primary">${t.btnWin}</a>`;
                if(btn.type === 'wip') return `<span class="btn btn-disabled">${t.btnWip}</span>`;
            }).join('');
            
            document.getElementById('det-buttons').innerHTML = buttonsHtml;
        }

        function closeApp() {
            document.getElementById('app-view').classList.remove('open');
        }

        function toggleAcc(el) {
            el.classList.toggle('active');
        }

        // Init
        renderProjects();
    </script>
</body>
</html>
