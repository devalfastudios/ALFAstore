<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALFA Studio - Store v1.4</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #030305;
            --glass-bg: rgba(13, 27, 42, 0.4);
            --glass-border: rgba(65, 105, 225, 0.2);
            --glass-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            --primary-color: #00d2ff;
            --secondary-color: #3a7bd5;
            --text-main: #ffffff;
            --text-muted: #a0aab5;
            --btn-hover: rgba(0, 210, 255, 0.2);
            --transition-speed: 0.4s;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Roboto', sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-main); min-height: 100vh; overflow-x: hidden; position: relative; }

        /* Background Effects */
        .bg-blobs { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; overflow: hidden; background: linear-gradient(to bottom right, #000000, #001220); }
        .blob { position: absolute; filter: blur(80px); opacity: 0.5; animation: float 15s infinite ease-in-out alternate; transform: translateZ(0); will-change: transform; }
        .blob-1 { width: 400px; height: 400px; background: var(--secondary-color); top: -10%; left: -10%; }
        .blob-2 { width: 500px; height: 500px; background: #000814; bottom: -20%; right: -10%; animation-delay: -5s; }
        .blob-3 { width: 300px; height: 300px; background: #005f73; top: 40%; left: 50%; animation-delay: -10s; }

        @keyframes float { 
            0% { transform: translate3d(0, 0, 0) scale(1); } 
            100% { transform: translate3d(30px, 50px, 0) scale(1.1); } 
        }

        /* Header */
        header { display: flex; justify-content: space-between; align-items: center; padding: 15px 5%; background: rgba(3, 3, 5, 0.7); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); border-bottom: 1px solid var(--glass-border); position: sticky; top: 0; z-index: 100; flex-wrap: wrap; gap: 15px; }
        .logo { font-size: 24px; font-weight: 700; background: linear-gradient(45deg, var(--primary-color), var(--secondary-color)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        .search-bar { flex-grow: 1; max-width: 400px; position: relative; }
        .search-bar input { width: 100%; padding: 10px 15px; border-radius: 20px; background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); color: white; outline: none; transition: var(--transition-speed); }
        .search-bar input:focus { border-color: var(--primary-color); background: rgba(255,255,255,0.1); }

        .lang-switch select { background: var(--glass-bg); color: var(--text-main); border: 1px solid var(--glass-border); padding: 8px 12px; border-radius: 8px; outline: none; cursor: pointer; transition: var(--transition-speed); }
        .lang-switch select:hover { border-color: var(--primary-color); }
        .lang-switch select option { background: var(--bg-color); color: var(--text-main); }

        /* Main Content */
        #content-wrapper { transition: opacity var(--transition-speed) ease; will-change: opacity; }
        .fade-out { opacity: 0 !important; }

        .hero { text-align: center; padding: 40px 20px; }
        .hero h1 { font-size: 2.5rem; margin-bottom: 15px; }
        .hero p { color: var(--text-muted); margin-bottom: 20px; }

        .container { max-width: 1200px; margin: 0 auto; padding: 0 20px 40px; }

        /* Filters */
        .filters { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 15px; margin-bottom: 25px; scrollbar-width: none; -ms-overflow-style: none; }
        .filters::-webkit-scrollbar { display: none; }
        .filter-btn { padding: 8px 18px; border-radius: 20px; background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); color: var(--text-muted); cursor: pointer; white-space: nowrap; transition: all 0.3s ease; font-weight: 500; font-size: 0.9rem; }
        .filter-btn:hover { background: rgba(255,255,255,0.1); border-color: var(--primary-color); color: white; }
        .filter-btn.active { background: var(--secondary-color); border-color: var(--primary-color); color: white; box-shadow: 0 0 15px rgba(0, 210, 255, 0.3); }

        /* Grid & Cards */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 25px; }
        
        @keyframes popIn {
            0% { opacity: 0; transform: translateY(20px) scale(0.95); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }

        .card { background: var(--glass-bg); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border: 1px solid var(--glass-border); border-radius: 16px; padding: 25px; cursor: pointer; transition: transform 0.3s, box-shadow 0.3s, border-color 0.3s; position: relative; overflow: hidden; display: flex; align-items: center; gap: 15px; opacity: 0; animation: popIn 0.5s cubic-bezier(0.25, 1, 0.5, 1) forwards; }
        .card:hover { transform: translateY(-5px); box-shadow: 0 10px 30px rgba(0, 210, 255, 0.15); border-color: rgba(0, 210, 255, 0.4); }
        .card-icon { width: 60px; height: 60px; background: linear-gradient(135deg, var(--glass-border), var(--secondary-color)); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 24px; font-weight: bold; flex-shrink: 0; }
        .card-info { flex-grow: 1; }
        .card-title { font-size: 1.2rem; margin-bottom: 5px; }
        .card-dev { font-size: 0.8rem; color: var(--text-muted); margin-bottom: 5px; }
        .badge-wip { font-size: 0.7rem; color: #ff9800; background: rgba(255, 152, 0, 0.1); border: 1px solid rgba(255, 152, 0, 0.3); padding: 2px 6px; border-radius: 8px; display: inline-block; }

        /* Loading Screen */
        #loader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(3,3,5,0.9); backdrop-filter: blur(10px); z-index: 999; display: flex; justify-content: center; align-items: center; opacity: 0; pointer-events: none; transition: opacity 0.3s; will-change: opacity; }
        #loader.active { opacity: 1; pointer-events: all; }
        .spinner { width: 50px; height: 50px; border: 4px solid rgba(255,255,255,0.1); border-top-color: var(--primary-color); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* App Details View */
        #app-view { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-color); z-index: 1000; overflow-y: auto; transform: translateX(100%); transition: transform 0.5s cubic-bezier(0.25, 1, 0.5, 1); will-change: transform; }
        #app-view.open { transform: translateX(0); }
        
        .app-view-header { padding: 20px 5%; position: sticky; top: 0; background: rgba(3,3,5,0.8); backdrop-filter: blur(10px); z-index: 10; border-bottom: 1px solid var(--glass-border); transform: translateZ(0); }
        .back-btn { background: transparent; border: none; color: white; font-size: 1.5rem; cursor: pointer; display: flex; align-items: center; gap: 10px; transition: color 0.3s; }
        .back-btn:hover { color: var(--primary-color); }

        .app-content { max-width: 900px; margin: 0 auto; padding: 40px 20px; }
        .app-hero { display: flex; gap: 25px; align-items: center; margin-bottom: 30px; }
        .app-hero .card-icon { width: 100px; height: 100px; font-size: 40px; border-radius: 20px; }
        .app-hero h1 { font-size: 2.5rem; margin-bottom: 5px; }
        .app-hero .dev { color: var(--primary-color); font-size: 1.1rem; }

        /* Buttons */
        .btn-group { display: flex; gap: 15px; margin-bottom: 40px; flex-wrap: wrap; }
        .btn { padding: 12px 25px; border-radius: 10px; text-decoration: none; font-size: 1rem; font-weight: 500; cursor: pointer; border: 1px solid transparent; text-align: center; min-width: 150px; transition: all 0.3s; display: inline-block; }
        .btn-primary { background: var(--secondary-color); color: #fff; }
        .btn-primary:hover { background: var(--primary-color); box-shadow: 0 0 15px rgba(0, 210, 255, 0.4); }
        .btn-outline { background: transparent; border-color: var(--secondary-color); color: var(--text-main); }
        .btn-outline:hover { background: var(--btn-hover); border-color: var(--primary-color); }
        .btn-disabled { background: rgba(255,255,255,0.05); color: #a0aab5; cursor: default; border-color: rgba(255,255,255,0.1); }

        /* Accordions */
        .accordion { background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: 12px; margin-bottom: 15px; overflow: hidden; }
        .acc-header { padding: 15px 20px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; font-weight: 500; transition: background 0.3s; }
        .acc-header:hover { background: rgba(255,255,255,0.05); }
        .acc-icon { transition: transform 0.3s; will-change: transform; }
        .accordion.active .acc-icon { transform: rotate(180deg); }
        .acc-body { max-height: 0; overflow: hidden; transition: max-height 0.4s ease; padding: 0 20px; color: var(--text-muted); line-height: 1.6; will-change: max-height; }
        .accordion.active .acc-body { max-height: 500px; padding: 0 20px 20px 20px; } 

        .recommendations { margin-top: 60px; padding-top: 30px; border-top: 1px solid var(--glass-border); }
        .recommendations h3 { margin-bottom: 20px; font-size: 1.5rem; }

        footer { text-align: center; padding: 20px; color: #555; font-size: 0.8rem; border-top: 1px solid var(--glass-border); margin-top: 40px; }
    </style>
</head>

            }
        };

        const categories = ['all', 'messenger', 'system', 'utility', 'media', 'office', 'game', 'education', 'ai'];

        let currentLang = 'uk';
        let currentSearch = '';

        const projects = [
            { id: 1, category: "messenger", title: "Hi Messenger OLD", version: "1.41", isWip: false, os: "Web Browser", desc: { uk: "Стара версія месенджера з підтримкою. Працює у браузері.", en: "Old messenger version. Runs in browser." }, buttons: [ { type: "browser", link: "https://sites.google.com/view/hi-messenger/messeger" } ] },

            { id: 6, category: "utility", title: "GComp HTML", version: "1.0", isWip: true, os: "Web Browser", desc: { uk: "Компілятор HTML прямо у вашому браузері.", en: "HTML compiler in browser." }, buttons: [ { type: "wip", link: "#" } ] },
            { id: 7, category: "utility", title: "GComp Python", version: "1.0", isWip: true, os: "Web Browser", desc: { uk: "Компілятор Python для браузера.", en: "Python compiler for browser." }, buttons: [ { type: "wip", link: "#" } ] },
            { id: 8, category: "system", title: "GExp", version: "Beta 1", isWip: false, os: "Windows 7, 8, 8.1, 10, 11", desc: { uk: "Заміна стандартному провіднику Windows. Працює виключно на Windows.", en: "Standard Windows explorer replacement. Works exclusively on Windows." }, buttons: [ { type: "windows", link: "https://www.mediafire.com/file/4v46b8rimsa7xuv/GExp.zip/file" } ] },

        function renderFilters() {
            const container = document.getElementById('filters-container');
            container.innerHTML = '';
            const t = translations[currentLang].cats;

            categories.forEach(cat => {
                const btn = document.createElement('button');
                btn.className = `filter-btn ${cat === currentCategory ? 'active' : ''}`;
                btn.innerText = t[cat];
                btn.onclick = () => {
                    currentCategory = cat;
                    renderFilters(); 
                    renderProjects();
                };
                container.appendChild(btn);
            });
        }

        function renderProjects(containerId = 'projects-container', limit = null, excludeId = null) {
            const container = document.getElementById(containerId);
            container.innerHTML = '';
            const t = translations[currentLang];

            let filtered = projects.filter(p => p.title.toLowerCase().includes(currentSearch.toLowerCase()));
            
            if (containerId === 'projects-container' && currentCategory !== 'all') {
                filtered = filtered.filter(p => p.category === currentCategory);
            }

            if (excludeId) filtered = filtered.filter(p => p.id !== excludeId);
            if (limit) filtered = filtered.sort(() => 0.5 - Math.random()).slice(0, limit);

            if (filtered.length === 0 && containerId === 'projects-container') {
                container.innerHTML = `<p style="color: var(--text-muted); padding: 20px;">Нічого не знайдено...</p>`;
                return;
            }

            filtered.forEach((proj, index) => {
                const card = document.createElement('div');
                card.className = 'card';
                // Додаємо затримку анімації для ефекту "хвилі"
                card.style.animationDelay = `${index * 0.05}s`;
                card.onclick = () => openApp(proj.id);
                
                let wipBadge = proj.isWip ? `<span class="badge-wip">${t.badgeWip}</span>` : '';
                let iconChar = proj.title.charAt(0);

                card.innerHTML = `
                    <div class="card-icon">${iconChar}</div>
                    <div class="card-info">
                        <h3 class="card-title">${proj.title}</h3>
                        <div class="card-dev">ALFA Studio</div>
                        ${wipBadge}
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function handleSearch() {
            currentSearch = document.getElementById('searchInput').value;
            renderProjects();
        }

        function changeLanguage(lang) {
            const wrapper = document.getElementById('content-wrapper');
            wrapper.classList.add('fade-out');
            
            setTimeout(() => {
                currentLang = lang;
                const t = translations[lang];
                
                document.getElementById('searchInput').placeholder = t.search;
                document.getElementById('hero-title').innerText = t.heroTitle;
                document.getElementById('hero-desc').innerText = t.heroDesc;
                document.getElementById('back-text').innerText = t.back;
                document.getElementById('lbl-desc').innerText = t.lblDesc;
                document.getElementById('lbl-info').innerText = t.lblInfo;
                document.getElementById('lbl-version').innerText = t.lblVer;
                document.getElementById('lbl-rec').innerText = t.lblRec;
                document.getElementById('det-dev').innerText = "ALFA Studio";
                
                renderFilters();
                renderProjects();
                
                if(document.getElementById('app-view').classList.contains('open')) {
                    let activeTitle = document.getElementById('det-title').innerText;
                    let p = projects.find(x => x.title === activeTitle);
                    if(p) populateAppDetails(p);
                }

                wrapper.classList.remove('fade-out');
            }, 400); 
        }

        function openApp(id) {
            const loader = document.getElementById('loader');
            loader.classList.add('active'); 

            setTimeout(() => {
                const proj = projects.find(p => p.id === id);
                populateAppDetails(proj);
                
                document.getElementById('app-view').classList.add('open');
                loader.classList.remove('active'); 
                
                renderProjects('rec-container', 6, id);
            }, 800); 
        }

        function populateAppDetails(proj) {
            const t = translations[currentLang];
            document.getElementById('det-icon').innerText = proj.title.charAt(0);
            document.getElementById('det-title').innerText = proj.title;
            document.getElementById('det-desc').innerText = proj.desc[currentLang];
            document.getElementById('det-version').innerText = proj.version;
            document.getElementById('det-os').innerText = proj.os;

            let buttonsHtml = proj.buttons.map(btn => {
                if(btn.type === 'browser') return `<a href="${btn.link}" target="_blank" class="btn btn-outline">${t.btnBrowser}</a>`;
                if(btn.type === 'windows') return `<a href="${btn.link}" target="_blank" class="btn btn-primary">${t.btnWin}</a>`;
                if(btn.type === 'wip') return `<span class="btn btn-disabled">${t.btnWip}</span>`;
            }).join('');
            
            document.getElementById('det-buttons').innerHTML = buttonsHtml;
        }

        function closeApp() {
            document.getElementById('app-view').classList.remove('open');
        }

        function toggleAcc(el) {
            el.classList.toggle('active');
        }

        // Init
        renderFilters();
        renderProjects();
    </script>
</body>
</html>
